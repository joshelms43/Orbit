<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Orbit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0A0A0C; --bg2:#0E0E12; --surface:#141419; --surface2:#1B1B22;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.13);
  --ink:#F3F1EC; --ink2:#9A9AA4; --ink3:#62626C;
  --gold:#D8B06A; --gold2:#ECCF92; --goldsoft:rgba(216,176,106,.13);
  --r:22px;
  --disp:'Fraunces',Georgia,serif; --ui:'Inter',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#000;color:var(--ink);font-family:var(--ui)}
body{display:flex;align-items:center;justify-content:center;overflow:hidden}
.void{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 80% at 50% -10%, #16151a 0%, #050506 60%, #000 100%);}
.phone{position:relative;width:min(440px,100vw);height:min(940px,100vh);background:var(--bg);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 40px 120px -30px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.04);}
@media(min-width:480px){.phone{border-radius:42px;height:min(900px,96vh)}}
#app{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#app::-webkit-scrollbar{display:none}
.statusbar{position:absolute;top:0;left:0;right:0;height:44px;display:flex;align-items:center;
  justify-content:space-between;padding:0 26px;font-size:13px;font-weight:600;color:var(--ink);
  z-index:60;pointer-events:none}
.statusbar .dots{display:flex;gap:5px;align-items:center;opacity:.85}
.statusbar .dots i{width:5px;height:5px;border-radius:50%;background:var(--ink);display:block}

/* ---------- reveal intro ---------- */
.intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:0 32px;
  background:radial-gradient(130% 90% at 50% 18%, #1a1820 0%, #0a0a0c 58%, #060607 100%);
  animation:fadeUp .9s cubic-bezier(.2,.7,.2,1) both}
.intro canvas{position:absolute;inset:0;opacity:.5}
.intro .inner{position:relative;z-index:2}
.eyebrow{font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink2);font-weight:500}
.intro h1{font-family:var(--disp);font-weight:300;font-size:clamp(58px,17vw,82px);line-height:.96;
  margin:18px 0 0;letter-spacing:-.02em;color:var(--ink)}
.intro .sub{margin-top:20px;color:var(--ink2);font-size:15px;max-width:230px;line-height:1.5}
.intro .sub b{color:var(--gold);font-weight:500}
.tapcue{position:absolute;bottom:46px;left:0;right:0;display:flex;justify-content:center;z-index:2}
.tapcue span{font-size:13px;color:var(--ink2);letter-spacing:.04em;padding:11px 22px;border-radius:999px;
  border:1px solid var(--line2);background:rgba(255,255,255,.02);animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.55;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}

/* ---------- stories ---------- */
.story{position:absolute;inset:0;background:#08080a;overflow:hidden;animation:fadeUp .5s ease both}
.story canvas{position:absolute;inset:0}
.story .scrim{position:absolute;inset:0;background:
  linear-gradient(180deg, rgba(8,8,10,.55) 0%, rgba(8,8,10,0) 26%, rgba(8,8,10,.15) 55%, rgba(6,6,8,.92) 100%)}
.segments{position:absolute;top:52px;left:16px;right:16px;display:flex;gap:6px;z-index:30}
.segments .seg{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.18);overflow:hidden}
.segments .seg b{display:block;height:100%;width:0;background:var(--ink);border-radius:3px}
.segments .seg.done b{width:100%}
.segments .seg.active b{width:100%;transition:width .35s ease}
.orderbtn{position:absolute;top:72px;right:18px;z-index:30;font-size:11.5px;color:var(--ink2);
  letter-spacing:.04em;border:1px solid var(--line2);background:rgba(10,10,12,.4);backdrop-filter:blur(8px);
  padding:7px 13px;border-radius:999px}
.tapzone{position:absolute;top:0;bottom:0;width:38%;z-index:20}
.tapzone.left{left:0}.tapzone.right{right:0;width:62%}
.story-content{position:absolute;left:30px;right:30px;bottom:64px;z-index:25;animation:contentIn .6s .1s ease both}
@keyframes contentIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.story-content .meta{font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);font-weight:500}
.story-name{font-family:var(--disp);font-weight:400;font-size:40px;letter-spacing:-.01em;margin:8px 0 2px}
.hero-distance{font-family:var(--disp);font-weight:300;font-size:clamp(70px,21vw,104px);line-height:.92;
  color:var(--gold);letter-spacing:-.03em;text-shadow:0 0 50px rgba(216,176,106,.28)}
.hero-distance small{font-size:.42em;color:var(--gold2);font-weight:400;margin-left:6px;letter-spacing:0}
.story-rank{margin-top:14px;display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2)}
.story-rank .pip{width:7px;height:7px;border-radius:50%}
.badges{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink);
  border:1px solid var(--line2);background:rgba(255,255,255,.04);padding:7px 12px;border-radius:999px}
.badge i{font-style:normal}

/* outro */
.outro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:0 40px;background:radial-gradient(120% 80% at 50% 35%, #15141a, #08080a 70%);
  animation:fadeUp .7s ease both}
.outro h2{font-family:var(--disp);font-weight:300;font-size:36px;margin:0 0 14px;letter-spacing:-.01em}
.outro p{color:var(--ink2);font-size:14.5px;line-height:1.55;max-width:250px;margin:0}

/* ---------- home ---------- */
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:40px;animation:fadeUp .45s ease both}
.screen::-webkit-scrollbar{display:none}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:54px 22px 14px;background:linear-gradient(180deg,var(--bg) 60%,rgba(10,10,12,0));}
.wordmark{font-family:var(--disp);font-weight:500;font-size:21px;letter-spacing:.01em}
.wordmark b{color:var(--gold);font-weight:500}
.iconbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.iconbtn svg{width:18px;height:18px}
.pad{padding:0 22px}
.hero{margin:6px 22px 22px;padding:22px 22px 24px;border-radius:26px;position:relative;overflow:hidden;
  background:linear-gradient(165deg, #1a1820 0%, #121117 100%);border:1px solid var(--line);}
.hero .label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);font-weight:500}
.hero .row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:14px}
.hero .who{font-family:var(--disp);font-size:30px;font-weight:400}
.hero .who span{display:block;font-family:var(--ui);font-size:12.5px;color:var(--ink2);font-weight:400;margin-top:4px;letter-spacing:.02em}
.hero .dist{font-family:var(--disp);font-weight:300;font-size:54px;color:var(--gold);line-height:.9;letter-spacing:-.02em}
.hero .dist small{font-size:.4em;color:var(--gold2)}
.hero canvas{position:absolute;right:-30px;top:-20px;width:180px;height:180px;opacity:.5}
.replay-tag{margin-top:18px;display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--gold2);font-weight:500}
.replay-tag svg{width:14px;height:14px}

.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:30px 22px 13px}
.sec-h h3{font-family:var(--disp);font-weight:500;font-size:18px;margin:0;letter-spacing:.005em}
.sec-h span{font-size:11.5px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase}

.recap{display:flex;gap:12px;overflow-x:auto;padding:2px 22px 4px;scroll-snap-type:x mandatory}
.recap::-webkit-scrollbar{display:none}
.rcard{scroll-snap-align:start;flex:0 0 150px;border-radius:20px;border:1px solid var(--line);
  background:var(--surface);padding:16px;position:relative;overflow:hidden}
.rcard .nm{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.rcard .nm i{width:9px;height:9px;border-radius:50%;display:block}
.rcard .d{font-family:var(--disp);font-weight:300;font-size:34px;margin-top:14px;letter-spacing:-.02em}
.rcard .d.close{color:var(--gold)}
.rcard .d small{font-size:.42em;color:var(--ink2)}
.rcard .t{font-size:11.5px;color:var(--ink3);margin-top:6px}
.rcard .pill{position:absolute;top:14px;right:14px;font-size:10.5px;color:var(--ink2);
  border:1px solid var(--line2);border-radius:999px;padding:3px 8px}

.card{margin:0 22px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.lb-row{display:flex;align-items:center;gap:14px;padding:13px 2px}
.lb-row+.lb-row{border-top:1px solid var(--line)}
.lb-rank{font-family:var(--disp);font-size:19px;color:var(--ink3);width:18px;text-align:center}
.lb-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;color:#0a0a0c;flex:0 0 auto}
.lb-main{flex:1;min-width:0}
.lb-name{font-size:15px;font-weight:500}
.lb-sub{font-size:12px;color:var(--ink2);margin-top:3px}
.lb-val{text-align:right}
.lb-val b{font-family:var(--disp);font-weight:400;font-size:18px;display:block;letter-spacing:-.01em}
.lb-val small{font-size:11px;color:var(--ink3)}
.chev{color:var(--ink3);margin-left:2px}

.legend{display:flex;gap:16px;margin:2px 0 16px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2)}
.legend i{width:8px;height:8px;border-radius:50%;display:block}
.graph{width:100%}
.gpath{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.gguide{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4}
.glabel{fill:var(--ink3);font-size:9px;font-family:var(--ui)}

.flist .lb-row{cursor:pointer}
.archive-mini{display:flex;flex-direction:column;gap:4px}
.wkrow{display:flex;gap:4px}
.cell{flex:1;aspect-ratio:1;border-radius:5px;background:var(--surface2);border:1px solid rgba(255,255,255,.03)}

/* ---------- friend page ---------- */
.backbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:54px 20px 14px;background:linear-gradient(180deg,var(--bg) 65%,rgba(10,10,12,0))}
.back{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--ink)}
.back svg{width:18px;height:18px}
.fp-hero{padding:6px 24px 8px}
.fp-name{font-family:var(--disp);font-weight:400;font-size:38px;letter-spacing:-.01em;display:flex;align-items:center;gap:12px}
.fp-name i{width:13px;height:13px;border-radius:50%}
.fp-since{color:var(--ink2);font-size:13px;margin-top:6px}
.fp-yest{margin:18px 24px;padding:20px;border-radius:22px;border:1px solid var(--line);
  background:linear-gradient(165deg,#19181f,#111016);display:flex;align-items:flex-end;justify-content:space-between}
.fp-yest .l{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2)}
.fp-yest .v{font-family:var(--disp);font-weight:300;font-size:46px;color:var(--gold);line-height:.9;margin-top:8px}
.fp-yest .v small{font-size:.4em;color:var(--gold2)}
.fp-yest .rgt{text-align:right;font-size:12px;color:var(--ink2)}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 22px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:15px 16px}
.stat .k{font-size:11.5px;color:var(--ink2);letter-spacing:.04em}
.stat .v{font-family:var(--disp);font-weight:400;font-size:26px;margin-top:7px;letter-spacing:-.01em}
.stat .v small{font-size:.5em;color:var(--ink2)}
.streaks{padding:0 22px;margin-top:11px;display:flex;flex-direction:column;gap:11px}
.streak{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:15px 16px}
.streak .ico{font-size:20px}
.streak .m{flex:1}
.streak .m b{font-size:14px;font-weight:500}
.streak .m span{display:block;font-size:12px;color:var(--ink2);margin-top:2px}
.streak .big{font-family:var(--disp);font-weight:400;font-size:24px}
.hl-row{display:flex;gap:12px;overflow-x:auto;padding:2px 22px 4px}
.hl-row::-webkit-scrollbar{display:none}
.hl{flex:0 0 130px;border-radius:18px;border:1px solid var(--line2);background:var(--surface);padding:15px;cursor:pointer}
.hl .ic{font-size:22px}
.hl .lab{font-size:12.5px;font-weight:500;margin-top:10px;line-height:1.3}
.hl .dt{font-size:11px;color:var(--ink3);margin-top:6px}
.hist-row{display:flex;align-items:center;gap:14px;padding:13px 2px;cursor:pointer}
.hist-row+.hist-row{border-top:1px solid var(--line)}
.hist-d{font-size:13.5px;flex:1}
.hist-d span{color:var(--ink3);font-size:12px;display:block;margin-top:2px}
.hist-v{font-family:var(--disp);font-size:17px}
.hist-v.close{color:var(--gold)}

/* ---------- replay viewer ---------- */
.viewer{position:absolute;inset:0;background:#08080a;z-index:80;display:flex;flex-direction:column;animation:fadeUp .4s ease both}
.viewer .vtop{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:14px;
  padding:54px 20px 0}
.viewer .vtitle{font-family:var(--disp);font-size:18px}
.viewer .vtitle span{display:block;font-family:var(--ui);font-size:12px;color:var(--ink2);margin-top:2px}
.viewer canvas{position:absolute;inset:0}
.viewer .vscrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,10,.6),rgba(8,8,10,0) 30%,rgba(6,6,8,.85))}
.viewer .vfoot{position:absolute;left:0;right:0;bottom:46px;z-index:10;text-align:center;padding:0 30px}
.viewer .vdist{font-family:var(--disp);font-weight:300;font-size:64px;color:var(--gold);line-height:.9;letter-spacing:-.02em}
.viewer .vdist small{font-size:.4em;color:var(--gold2)}
.viewer .vmeta{color:var(--ink2);font-size:13.5px;margin-top:10px}
.replaybtn{margin-top:22px;display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line2);
  background:rgba(255,255,255,.04);color:var(--ink);padding:12px 22px;border-radius:999px;font-size:14px;font-weight:500}
.replaybtn svg{width:16px;height:16px}

/* day view list inside archive */
.day-row{display:flex;align-items:center;gap:14px;padding:15px 2px;cursor:pointer}
.day-row+.day-row{border-top:1px solid var(--line)}

@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- map ---------- */
.leaflet-container{background:#0a0a0c!important;font-family:var(--ui)!important;outline:none}
.leaflet-tile-pane{filter:saturate(.85) brightness(.92)}
.leaflet-control-attribution{background:rgba(10,10,12,.5)!important;color:var(--ink3)!important;
  font-size:9px!important;padding:1px 6px!important;backdrop-filter:blur(4px)}
.leaflet-control-attribution a{color:var(--ink2)!important}
.map{position:absolute;inset:0;z-index:0;isolation:isolate}
.map .ov{position:absolute;inset:0;pointer-events:none;z-index:500}
.maplegend{position:absolute;left:20px;bottom:150px;z-index:10;display:flex;gap:14px;
  background:rgba(10,10,12,.45);backdrop-filter:blur(8px);border:1px solid var(--line);
  padding:8px 13px;border-radius:999px;font-size:12px;color:var(--ink2)}
.maplegend span{display:inline-flex;align-items:center;gap:7px}
.maplegend i{width:8px;height:8px;border-radius:50%;display:block}
/* swipe-to-close cue on stories */
.swipe-cue{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:40;display:flex;
  flex-direction:column;align-items:center;gap:5px;pointer-events:none;opacity:.0;animation:cueIn .6s .5s ease forwards}
.swipe-cue .bar{width:38px;height:4px;border-radius:999px;background:rgba(255,255,255,.32)}
.swipe-cue .txt{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.42)}
@keyframes cueIn{to{opacity:1}}
.story{will-change:transform,opacity}
/* highlights — Instagram-style circular bubbles */
.hl-row{display:flex;gap:18px;overflow-x:auto;padding:6px 22px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hl-row::-webkit-scrollbar{display:none}
.hl-bubble{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:9px;background:none;border:0;
  padding:0;cursor:pointer;width:66px}
.hl-ring{width:64px;height:64px;border-radius:50%;padding:2.5px;display:grid;place-items:center;
  background:conic-gradient(from 215deg, var(--gold2), var(--gold), #8f7236, var(--gold2));
  transition:transform .15s ease}
.hl-bubble:active .hl-ring{transform:scale(.94)}
.hl-cover{width:100%;height:100%;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(125% 125% at 32% 26%, var(--c), #0c0c10 92%);
  box-shadow:inset 0 0 0 2.5px var(--bg);
  color:#fff;font-family:var(--disp);font-size:23px;font-weight:500;text-shadow:0 1px 6px rgba(0,0,0,.45)}
.hl-lab{display:flex;flex-direction:column;align-items:center;line-height:1.2;font-size:12px;font-weight:600;color:var(--ink)}
.hl-lab small{font-size:10.5px;font-weight:400;color:var(--ink2)}
/* achievement line on friend cards */
.ach{margin-top:5px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.ach.near{color:var(--gold2)}
.ach.far{color:#E7B98A}
/* records */
.rec-grid{display:flex;flex-direction:column;gap:12px;padding:0 18px}
.rec-card{border-radius:18px;border:1px solid var(--line);background:var(--surface);padding:14px 15px;cursor:pointer;
  transition:transform .14s ease, border-color .14s ease}
.rec-card:active{transform:scale(.99)}
.rec-head{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:11px;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
.rec-row{display:flex;align-items:center;gap:9px;padding:5px 0}
.rec-row+.rec-row{border-top:1px solid var(--line)}
.rec-medal{font-size:15px;width:20px;text-align:center;flex:0 0 auto}
.rec-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.rec-name{font-size:14px;font-weight:500}
.rec-val{margin-left:auto;font-family:var(--disp);font-size:16px;color:var(--ink);letter-spacing:-.01em}
.rec-val.gold{color:var(--gold2)}
.rec-sub{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:12px;color:var(--ink2)}
.rec-empty{font-size:13px;color:var(--ink3)}
.rankchart .glabel{fill:var(--ink2);font-size:10px}
/* ---- live app screens (auth / onboard / friends / account) ---- */
.cx-auth{display:flex;align-items:center;justify-content:center;min-height:100%;padding:38px 22px;box-sizing:border-box}
.cx-wrap{width:100%;max-width:360px;display:flex;flex-direction:column;gap:13px}
.cx-mark{font-family:var(--disp);font-size:30px;font-weight:300;text-align:center;color:var(--ink);letter-spacing:-.01em}
.cx-mark b{font-weight:600;color:var(--gold)}
.cx-tag{text-align:center;color:var(--ink2);font-size:14px;margin:-4px 0 6px;line-height:1.45}
.cx-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px}
.cx-label{display:block;font-size:12px;color:var(--ink2);margin-bottom:7px;font-weight:500}

<body>
<div class="void"><div class="phone" id="phone">
  <div class="statusbar"><span id="clock">9:41</span><span class="dots"><i></i><i></i><i></i></span></div>
  <div id="app"></div>
</div></div>

<script>
/* ============================================================================
   ORBIT — Engine (v3, route-based / always-moving)

   Dummy data is emitted in the EXACT shape real GPS is collected:
     LocationFix = { t: epoch ms, lat, lng, acc(m) }
   Everyone is always in motion along a continuous daily route, so closest
   approaches happen mid-transit. The processor solves the TRUE closest instant
   (continuous, between fixes). Swap point to go live: replace sampleRoute()
   with a reader of real recorded fixes. Nothing downstream changes.
   ========================================================================== */

function mulberry32(seed){let a=seed>>>0;return function(){a|=0;a=(a+0x6D2B79F5)|0;
  let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function gauss(rng){let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

/* ---- geo ---------------------------------------------------------------- */
const R=6371000;
function haversine(a,b){const dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,
  la=a.lat*Math.PI/180,lb=b.lat*Math.PI/180;
  const h=Math.sin(dLat/2)**2+Math.cos(la)*Math.cos(lb)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(h)));}
const mPerLat=1/111111, mPerLng=lat=>1/(111111*Math.cos(lat*Math.PI/180));
function offM(pt,m,ang){return{lat:pt.lat+(m*Math.sin(ang))*mPerLat, lng:pt.lng+(m*Math.cos(ang))*mPerLng(pt.lat)};}

/* ---- world constants ---------------------------------------------------- */
const SEED=7, DAYS=90, DAY_START=360, DAY_END=1380, STEP_SEC=20;   // 20-second fixes, 06:00–23:00

const HOME_JOSH={lat:-26.6290,lng:153.0920};                     // Twin Waters
const SP={                                                        // Sunshine Coast spots
  MAROOCHY:{lat:-26.6580,lng:153.0920}, COTTON_TREE:{lat:-26.6540,lng:153.1010},
  MOOLOOLABA:{lat:-26.6810,lng:153.1180}, ALEX:{lat:-26.6700,lng:153.1100},
  USC:{lat:-26.7170,lng:153.0570}, MARKET:{lat:-26.6500,lng:153.0900},
  BEACH:{lat:-26.6520,lng:153.1035}, KAWANA:{lat:-26.6900,lng:153.1330},
  BRISBANE:{lat:-27.4698,lng:153.0251},
};

// friends. cross = chance of crossing Josh on a given day ('all' = every day);
// sep = [min,max] metres apart at the crossing; spots = where they tend to meet.
// sep = [min,max] metres for the day's closest approach. Close friends draw small,
// acquaintances draw large. Everyone has a real closest-approach event every day.
const FR=[
  {id:'tom', name:'Tom', color:'#7C9CB5', home:{lat:-26.6312,lng:153.0905}, sinceDays:540, sep:[15,150],   spots:['MARKET','BEACH','COTTON_TREE','MAROOCHY']},
  {id:'emma',name:'Emma',color:'#C39B86', home:{lat:-26.6350,lng:153.0965}, sinceDays:410, sep:[70,560],   spots:['COTTON_TREE','BEACH','ALEX'], travel:{days:[80,81,82],to:'BRISBANE'}},
  {id:'mia', name:'Mia', color:'#A98CB5', home:{lat:-26.6720,lng:153.0980}, sinceDays:300, sep:[150,1500], spots:['ALEX','COTTON_TREE','USC','BEACH']},
  {id:'ben', name:'Ben', color:'#8FA98C', home:{lat:-26.6620,lng:153.1080}, sinceDays:220, sep:[400,2200], spots:['MOOLOOLABA','KAWANA','ALEX']},
  {id:'kai', name:'Kai', color:'#B5A87C', home:{lat:-26.6450,lng:153.0700}, sinceDays:150, sep:[1100,2600],spots:['USC','MARKET','MAROOCHY']},
];

/* ---- per-(friend,day) plan (deterministic) ------------------------------ */
function planFor(fi, friend, day){
  const rng=mulberry32((0x9E3779B9 ^ (SEED*2654435761) ^ (day*1000003) ^ (fi*19349663))>>>0);
  if(friend.travel && friend.travel.days.includes(day)) return {type:'away', to:friend.travel.to, rng};
  const spot=friend.spots[Math.floor(rng()*friend.spots.length)];
  const tc=495+rng()*585;                                        // ~08:15–18:00, fractional minute
  const sep=friend.sep[0]+rng()*(friend.sep[1]-friend.sep[0]);
  const angF=rng()*6.283, dirJ=rng()*6.283, dirF=dirJ+1.0+rng()*2.0;
  return {type:'meet', spot, tc, sep, angF, dirJ, dirF, rng};
}

// build everyone's continuous routes for one day: [{t(min),lat,lng}, ...]
// a meeting = two skew paths converging to a true closest approach of exactly `sep`,
// offset perpendicular to the relative velocity so the paths never actually intersect.
function meetGeom(c, m){
  const jc=offM(c,6,m.rng()*6.283);                              // Josh's crossing point
  const vJ={x:Math.cos(m.dirJ),y:Math.sin(m.dirJ)}, vF={x:Math.cos(m.dirF),y:Math.sin(m.dirF)};
  const wx=vJ.x-vF.x, wy=vJ.y-vF.y, wl=Math.hypot(wx,wy)||1;
  const nx=-wy/wl, ny=wx/wl, side=m.angF<Math.PI?1:-1;          // unit vector perpendicular to relative velocity
  const pt=(ex,nn)=>({lat:jc.lat+nn*mPerLat, lng:jc.lng+ex*mPerLng(jc.lat)});
  const L=320+m.rng()*820, ox=nx*m.sep*side, oy=ny*m.sep*side;   // varied speed (walk→brisk); closest (=sep) lands mid-segment at tc
  return {
    josh:[{t:m.tc-5,...pt(-vJ.x*L,-vJ.y*L)},{t:m.tc+5,...pt(vJ.x*L,vJ.y*L)}],
    friend:[{t:m.tc-5,...pt(ox-vF.x*L,oy-vF.y*L)},{t:m.tc+5,...pt(ox+vF.x*L,oy+vF.y*L)}],
  };
}
function buildDay(day){
  const plans=FR.map((f,fi)=>({f,fi,m:planFor(fi,f,day)}));
  // Josh: passes THROUGH each crossing, always moving
  const legs=[], geom={};
  for(const {f,m} of plans){ if(m.type==='meet'){ const g=meetGeom(SP[m.spot],m); geom[f.id]=g; legs.push({tc:m.tc,pts:g.josh}); } }
  legs.sort((a,b)=>a.tc-b.tc);
  const josh=[{t:DAY_START,...HOME_JOSH}];
  if(legs.length===0) josh.push({t:720,...offM(SP.MAROOCHY,60,1.2)},{t:721,...offM(SP.MAROOCHY,60,1.4)});
  else for(const lg of legs) josh.push(...lg.pts);
  josh.push({t:DAY_END,...HOME_JOSH});
  // friends
  const friends={};
  for(const {f,fi,m} of plans){
    if(m.type==='away'){ const c=SP[m.to];
      friends[f.id]=[{t:DAY_START,...offM(c,40,0)},{t:660,...offM(c,700,1)},{t:1020,...offM(c,500,3.5)},{t:DAY_END,...offM(c,40,2)}];
    } else {
      friends[f.id]=[{t:DAY_START,...f.home}, ...geom[f.id].friend, {t:DAY_END,...f.home}];
    }
  }
  return {josh, friends};
}

/* ---- THE SWAP POINT: sample a route into real-shaped GPS fixes ---------- */
function routePos(route,minute){
  if(minute<=route[0].t)return route[0];
  if(minute>=route[route.length-1].t)return route[route.length-1];
  for(let i=0;i<route.length-1;i++){ if(minute<=route[i+1].t){
    const a=route[i],b=route[i+1],r=(minute-a.t)/Math.max(1e-6,b.t-a.t);
    return{lat:a.lat+(b.lat-a.lat)*r,lng:a.lng+(b.lng-a.lng)*r}; } }
  return route[route.length-1];
}
function sampleRoute(route, baseDate, rng){
  const fixes=[];
  for(let sec=DAY_START*60; sec<=DAY_END*60; sec+=STEP_SEC){
    const p=routePos(route, sec/60);
    const pp=offM(p, Math.abs(gauss(rng))*2.2, rng()*6.283);     // ~2 m GPS wander (open-sky)
    fixes.push({t:baseDate.getTime()+sec*1000, lat:+pp.lat.toFixed(6), lng:+pp.lng.toFixed(6), acc:+(4+Math.abs(gauss(rng))*6).toFixed(1)});
  }
  return fixes;
}

/* ---- processing: continuous TRUE closest approach ----------------------- */
// real apps smooth GPS before measuring; a moving average kills per-fix jitter
// without blurring straight-line travel, so the closest instant is well-defined.
function smoothFixes(fx){
  const n=fx.length,out=new Array(n),R=6;
  for(let i=0;i<n;i++){let la=0,lo=0,c=0;
    for(let j=i-R;j<=i+R;j++){const k=j<0?0:(j>=n?n-1:j);la+=fx[k].lat;lo+=fx[k].lng;c++;}
    out[i]={t:fx[i].t,lat:la/c,lng:lo/c,acc:fx[i].acc};}
  return out;
}
function posAtTime(fixes,t){
  if(t<=fixes[0].t)return{lat:fixes[0].lat,lng:fixes[0].lng};
  const last=fixes[fixes.length-1];
  if(t>=last.t)return{lat:last.lat,lng:last.lng};
  let lo=0,hi=fixes.length-1;
  while(hi-lo>1){const mid=(lo+hi)>>1;(fixes[mid].t<=t)?lo=mid:hi=mid;}
  const a=fixes[lo],b=fixes[hi],r=(t-a.t)/(b.t-a.t);
  return{lat:a.lat+(b.lat-a.lat)*r,lng:a.lng+(b.lng-a.lng)*r};
}
function processDay(meFixes,friendFixes){
  const ref=meFixes[meFixes.length>>1], cosR=Math.cos(ref.lat*Math.PI/180);
  const XY=ll=>({x:(ll.lng-ref.lng)*111111*cosR, y:(ll.lat-ref.lat)*111111});
  let bestD2=Infinity, tStar=meFixes[0].t;
  const aligned = meFixes.length===friendFixes.length
    && meFixes[0].t===friendFixes[0].t && meFixes[meFixes.length-1].t===friendFixes[friendFixes.length-1].t;
  if(aligned){
    // shared timestamp grid (recorded together) -> O(n), no per-point search
    for(let i=0;i<meFixes.length-1;i++){
      const ma=XY(meFixes[i]),mb=XY(meFixes[i+1]),fa=XY(friendFixes[i]),fb=XY(friendFixes[i+1]);
      const rax=ma.x-fa.x,ray=ma.y-fa.y, ux=(mb.x-fb.x)-rax, uy=(mb.y-fb.y)-ray, uu=ux*ux+uy*uy;
      let s=uu>1e-9?-(rax*ux+ray*uy)/uu:0; s=s<0?0:s>1?1:s;
      const dx=rax+ux*s,dy=ray+uy*s,d2=dx*dx+dy*dy;
      if(d2<bestD2){bestD2=d2;tStar=meFixes[i].t+(meFixes[i+1].t-meFixes[i].t)*s;}
    }
  }else{
    // general path for irregular / unaligned real device streams
    const lo=Math.max(meFixes[0].t,friendFixes[0].t), hi=Math.min(meFixes[meFixes.length-1].t,friendFixes[friendFixes.length-1].t);
    const set={};
    for(const f of meFixes) if(f.t>=lo&&f.t<=hi) set[f.t]=1;
    for(const f of friendFixes) if(f.t>=lo&&f.t<=hi) set[f.t]=1;
    const T=Object.keys(set).map(Number).sort((a,b)=>a-b);
    for(let i=0;i<T.length-1;i++){
      const ta=T[i],tb=T[i+1];
      const ma=XY(posAtTime(meFixes,ta)),mb=XY(posAtTime(meFixes,tb));
      const fa=XY(posAtTime(friendFixes,ta)),fb=XY(posAtTime(friendFixes,tb));
      const rax=ma.x-fa.x,ray=ma.y-fa.y, ux=(mb.x-fb.x)-rax, uy=(mb.y-fb.y)-ray, uu=ux*ux+uy*uy;
      let s=uu>1e-9?-(rax*ux+ray*uy)/uu:0; s=s<0?0:s>1?1:s;
      const dx=rax+ux*s,dy=ray+uy*s,d2=dx*dx+dy*dy;
      if(d2<bestD2){bestD2=d2;tStar=ta+(tb-ta)*s;}
    }
  }
  const lo=Math.max(meFixes[0].t,friendFixes[0].t), hi=Math.min(meFixes[meFixes.length-1].t,friendFixes[friendFixes.length-1].t);
  const closest=haversine(posAtTime(meFixes,tStar),posAtTime(friendFixes,tStar));
  // replay window: 5 min before -> 1 min after, sampled every 15 s
  const PRE=5*60000,POST=60000,STEP_MS=15000, wStart=Math.max(lo,tStar-PRE),wEnd=Math.min(hi,tStar+POST);
  let times=[];for(let t=wStart;t<wEnd;t+=STEP_MS)times.push(t);times.push(wEnd);
  if(times.indexOf(tStar)===-1)times.push(tStar);
  times=[...new Set(times)].sort((a,b)=>a-b);
  const replay=times.map(t=>({t,me:posAtTime(meFixes,t),them:posAtTime(friendFixes,t)}));
  return{closest,closestT:tStar,replay,closestIndexInReplay:times.indexOf(tStar)};
}

/* ---- build the world ---------------------------------------------------- */
function buildWorld(seed=SEED){
  const rng=mulberry32(seed);
  const today=new Date();today.setHours(0,0,0,0);
  const dates=[];for(let i=DAYS;i>=1;i--){const d=new Date(today);d.setDate(d.getDate()-i);dates.push(d);}
  const records={};FR.forEach(f=>records[f.id]=[]);

  for(let day=0;day<DAYS;day++){
    const rt=buildDay(day);
    const meFixes=smoothFixes(sampleRoute(rt.josh,dates[day],rng));
    const dayRecs=[];
    for(const f of FR){
      const fFixes=smoothFixes(sampleRoute(rt.friends[f.id],dates[day],rng));
      const r=processDay(meFixes,fFixes);
      const cT=new Date(r.closestT);
      const rec={friend:f.id,date:dates[day],dayIndex:day,
        closest:r.closest,closestT:r.closestT,closestMin:cT.getHours()*60+cT.getMinutes(),
        replay:r.replay,closestIndexInReplay:r.closestIndexInReplay,rank:0,badges:[]};
      records[f.id].push(rec);dayRecs.push(rec);
    }
    dayRecs.slice().sort((a,b)=>a.closest-b.closest).forEach((r,i)=>r.rank=i+1);
  }

  const friendData=FR.map(f=>{
    const recs=records[f.id],closest=recs.map(r=>r.closest);
    const sorted=closest.slice().sort((a,b)=>a-b), median=sorted[Math.floor(sorted.length/2)];
    const avg=closest.reduce((s,v)=>s+v,0)/closest.length, within=m=>recs.filter(r=>r.closest<=m).length;
    const furthest=Math.max(...closest),furthestDay=recs.find(r=>r.closest===furthest);
    const avgRank=recs.reduce((s,r)=>s+r.rank,0)/recs.length, daysNo1=recs.filter(r=>r.rank===1).length;
    const run=test=>{let cur=0,rec=0;for(const r of recs){if(test(r)){cur++;rec=Math.max(rec,cur);}else cur=0;}
      let trail=0;for(let i=recs.length-1;i>=0;i--){if(test(recs[i]))trail++;else break;}return{current:trail,record:rec};};
    const s1km=run(r=>r.closest<=1000),s100=run(r=>r.closest<=100),sNo1=run(r=>r.rank===1);
    if(furthest>25000)furthestDay.badges.push({icon:'🌍',label:'Furthest ever'});
    let c=0;for(const r of recs){if(r.closest<=1000){c++;if(c===30)r.badges.push({icon:'🔥',label:'30 days within 1 km'});}else c=0;}
    let n1=0;for(const r of recs){if(r.rank===1){n1++;if(n1===25)r.badges.push({icon:'🥇',label:'25 days ranked #1'});}}
    if(f.sinceDays>365)recs[0].badges.push({icon:'🏠',label:'First year together'});
    else if(f.sinceDays>100)recs[0].badges.push({icon:'🤝',label:'100 days together'});
    return{...f,records:recs,yesterday:recs[recs.length-1],median,avg,furthest,furthestDay:furthestDay.date,
      within100:within(100),within1k:within(1000),within5k:within(5000),avgRank,daysNo1,
      streak1km:s1km,streak100:s100,streakNo1:sNo1};
  });

  const leaderboard=friendData.slice().sort((a,b)=>a.median-b.median);
  return{me:{id:'josh',name:'Josh'},friends:friendData,leaderboard,dates,DAYS,home:HOME_JOSH};
}


</script>

<script>
/* ============================ ORBIT — UI ============================ */
let world = null;
const app = document.getElementById('app');
const phone = document.getElementById('phone');
const ICON = {
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4.5" width="18" height="17" rx="3"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 5l-7 7 7 7"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  replay:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 12a9 9 0 1 0 2.6-6.4M3 4v4h4"/></svg>',
  fwd:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5l7 7-7 7"/></svg>',
};

/* ---- formatting ---- */
function fmtDist(m){
  if(m<1000) return Math.round(m)+'<small> m</small>';
  if(m<100000) return (m/1000).toFixed(2)+'<small> km</small>';
  return Math.round(m/1000).toLocaleString()+'<small> km</small>';
}
function distParts(m){
  if(m<1000) return [String(Math.round(m)),'m'];
  if(m<100000) return [(m/1000).toFixed(2),'km'];
  return [Math.round(m/1000).toLocaleString(),'km'];
}
function fmtClock(min){let h=Math.floor(min/60),m=min%60,ap=h<12?'am':'pm',hh=h%12;if(hh===0)hh=12;return hh+':'+String(m).padStart(2,'0')+' '+ap;}
function fmtClockSec(e){return new Date(e).toLocaleString('en-AU',{timeZone:'Australia/Brisbane',hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true}).toLowerCase().replace(/\u202f|\u00a0/g,' ');}
function fDate(d,o){return d.toLocaleDateString('en-AU',Object.assign({timeZone:'Australia/Brisbane'},o||{weekday:'long',day:'numeric',month:'long'}));}
function fShort(d){return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
const byId=id=>world.friends.find(f=>f.id===id);

/* ---- animation registry ---- */
let anims=[];
function clearAnims(){anims.forEach(c=>{try{c()}catch(e){}});anims=[];}
function animate(dur, fn, {loop=false}={}){
  let raf, start=null, killed=false;
  const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  function step(ts){ if(killed)return; if(start===null)start=ts; let t=(ts-start)/dur;
    if(t>=1){ fn(1,ease(1)); if(loop){start=ts; raf=requestAnimationFrame(step);} else return; }
    else { fn(t,ease(t)); raf=requestAnimationFrame(step); } }
  raf=requestAnimationFrame(step);
  const cancel=()=>{killed=true;cancelAnimationFrame(raf);};
  anims.push(cancel); return cancel;
}

/* ---- replay rendering: shared painter (time-based, comet trail, glow dots) ---- */
function fmtDistPlain(m){return m<1000?Math.round(m)+' m':m<100000?(m/1000).toFixed(2)+' km':Math.round(m/1000).toLocaleString()+' km';}
function hexA(h,a){const n=parseInt(h.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}

// the choreography: sweep the approach at a steady pace, then begin the zoom the moment they arrive
function replayTimeline(rawP, t0, tC){
  const sm=t=>{t=t<0?0:t>1?1:t;return t*t*(3-2*t);};
  const headP=Math.min(1, rawP/0.80);                          // near-linear sweep (the data already eases the landing)
  const headT=t0+(tC-t0)*headP;
  const env=sm(Math.min(1, rawP/0.05));
  const focus=sm(Math.min(1, Math.max(0,(rawP-0.70)/0.30)));   // zoom kicks in right as they get there — no pause first
  return {headT, env, focus};
}

function makePaint(ctx, project, pts, ci, fcol, DPR, distStr, starts){
  const gold='#D8B06A'; const S=starts||{me:0,them:0};
  const lerpLL=(a,b,t)=>({lat:a.lat+(b.lat-a.lat)*t,lng:a.lng+(b.lng-a.lng)*t});
  function headAt(tt){let hi=pts.length-2;for(let i=0;i<pts.length-1;i++){if(tt<=pts[i+1].t){hi=i;break;}}if(hi<0)hi=0;
    const seg=(tt-pts[hi].t)/Math.max(1,pts[hi+1].t-pts[hi].t);
    return{hi,me:lerpLL(pts[hi].me,pts[hi+1].me,seg),them:lerpLL(pts[hi].them,pts[hi+1].them,seg)};}
  function trail(track,col,h){ctx.lineCap='round';ctx.lineJoin='round';
    const s=Math.max(0,S[track]||0); if(h.hi<s)return;            // this person's final km hasn't begun yet
    ctx.save();ctx.shadowColor=col;ctx.shadowBlur=7*DPR;
    const denom=Math.max(1,h.hi+1-s);
    for(let i=s;i<h.hi;i++){const a=project(pts[i][track]),b=project(pts[i+1][track]),f=(i+1-s)/denom;
      ctx.globalAlpha=0.06+0.4*f;ctx.strokeStyle=col;ctx.lineWidth=(1.6+1.2*f)*DPR;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    const a=project(pts[h.hi][track]),b=project(h[track]);
    ctx.globalAlpha=0.6;ctx.strokeStyle=col;ctx.lineWidth=2.8*DPR;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.restore();ctx.globalAlpha=1;}
  function dot(pt,col,r){const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r*4.6);
    g.addColorStop(0,hexA(col,.5));g.addColorStop(.4,hexA(col,.16));g.addColorStop(1,hexA(col,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x,pt.y,r*4.6,0,7);ctx.fill();
    ctx.save();ctx.shadowColor=col;ctx.shadowBlur=12*DPR;ctx.fillStyle=col;ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,7);ctx.fill();ctx.restore();
    ctx.globalAlpha=.92;ctx.fillStyle='#FCF8F0';ctx.beginPath();ctx.arc(pt.x,pt.y,r*0.36,0,7);ctx.fill();ctx.globalAlpha=1;}
  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function pill(mx,my,text,a,scale){ctx.save();ctx.globalAlpha=a;
    ctx.font=`600 ${13*DPR*scale}px Inter, system-ui, sans-serif`;
    const tw=ctx.measureText(text).width, padx=11*DPR*scale, h=25*DPR*scale, w=tw+padx*2, x=mx-w/2, y=my-h/2;
    ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=12*DPR;
    rr(x,y,w,h,h/2);ctx.fillStyle='rgba(14,13,12,.86)';ctx.fill();ctx.shadowBlur=0;
    ctx.lineWidth=1*DPR;ctx.strokeStyle=hexA(gold,.55);ctx.stroke();
    ctx.fillStyle='#ECCF92';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,mx,y+h/2+0.5*DPR);
    ctx.restore();}
  return function(headT, env, focus, rawP, W, H){
    if(focus>0.01){const g=ctx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.16,W/2,H*0.46,Math.max(W,H)*0.62);
      g.addColorStop(0,'rgba(5,5,7,0)');g.addColorStop(1,hexA('#050507',0.5*focus));ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    const h=headAt(headT);
    ctx.globalAlpha=env;trail('them',fcol,h);trail('me',gold,h);
    if(focus>0.01){
      const a=project(pts[ci].me),b=project(pts[ci].them),mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      ctx.globalAlpha=env*focus;ctx.setLineDash([3*DPR,5*DPR]);ctx.strokeStyle=gold;ctx.lineWidth=1.4*DPR;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.setLineDash([]);
      const pulse=0.5+0.5*Math.sin(rawP*Math.PI*6);
      ctx.globalAlpha=env*focus*0.6;ctx.lineWidth=1.3*DPR;
      ctx.beginPath();ctx.arc(mx,my,(8+3*pulse)*DPR,0,7);ctx.stroke();
      pill(mx,my-30*DPR,distStr,env*focus,0.78+0.22*focus);
    }
    ctx.globalAlpha=env;dot(project(h.them),fcol,5.0*DPR);dot(project(h.me),gold,5.7*DPR);ctx.globalAlpha=1;
  };
}

/* ---- field fallback (no tiles) — punch-in done by scaling the projection ---- */
function fieldReplay(canvas, rec, friend, {duration=6200, loop=true, ambient=false, framePad}={}){
  if(!replayRenderable(rec)) return ()=>{};   // sparse/degenerate replay — skip safely (e.g. ambient hero)
  const ctx=canvas.getContext('2d');const DPR=Math.min(2,window.devicePixelRatio||1);
  const r=canvas.getBoundingClientRect();canvas.width=Math.max(2,r.width*DPR);canvas.height=Math.max(2,r.height*DPR);
  const W=canvas.width,H=canvas.height,pts=rec.replay,ci=rec.closestIndexInReplay;
  const fp=framePad||{top:ambient?20:30,bottom:ambient?20:30,x:ambient?20:30};
  const topP=fp.top*DPR, botP=fp.bottom*DPR, xP=fp.x*DPR;
  const lat0=pts[ci].me.lat,mLat=111111,mLng=111111*Math.cos(lat0*Math.PI/180);
  const X=ll=>(ll.lng-pts[0].me.lng)*mLng,Y=ll=>(ll.lat-lat0)*mLat;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  const ms=rec.meStartIdx||0, ts=rec.themStartIdx||0;
  const acc=q=>{const x=X(q),y=Y(q);minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);};
  for(let i=ms;i<=ci;i++)acc(pts[i].me); for(let i=ts;i<=ci;i++)acc(pts[i].them);
  const wideCX=(minX+maxX)/2,wideCY=(minY+maxY)/2,MIN=ambient?140:230;
  const bw=Math.max(maxX-minX,MIN),bh=Math.max(maxY-minY,MIN);
  const availW=W-2*xP, availH=H-topP-botP, cxPix=W/2, cyPix=topP+availH/2;
  const baseScale=Math.min(availW/bw, availH/bh)*0.86;
  const closeMX=(X(pts[ci].me)+X(pts[ci].them))/2, closeMY=(Y(pts[ci].me)+Y(pts[ci].them))/2;
  let K=1,CX=wideCX,CY=wideCY;
  const canZoom=rec.closest<3000, ZK=canZoom?0.75:0;
  const project=ll=>({x:(X(ll)-CX)*baseScale*K+cxPix, y:-(Y(ll)-CY)*baseScale*K+cyPix});
  const paint=makePaint(ctx,project,pts,ci,friend.color,DPR,fmtDistPlain(rec.closest),{me:rec.meStartIdx||0,them:rec.themStartIdx||0});
  const t0=pts[0].t,tC=pts[ci].t;
  return animate(duration, rawP=>{const tl=replayTimeline(rawP,t0,tC);
    K=1+ZK*tl.focus; CX=wideCX+(closeMX-wideCX)*(canZoom?tl.focus:0); CY=wideCY+(closeMY-wideCY)*(canZoom?tl.focus:0);
    ctx.clearRect(0,0,W,H); paint(tl.headT,tl.env,tl.focus,rawP,W,H);},{loop:false});
}

/* ---- real Sunshine Coast map; smooth fly-in to the moment, then hold ---- */
/* NOTE (for native rebuild): the brief tile blank during the zoom-in is a Leaflet/web-tiles
   artifact only. A native build (MapKit / Mapbox / Google native) caches and zooms tiles
   internally and won't have this. Not worth solving on the web prototype — if a flawless demo
   is ever needed, switch the replay to the tile-less canvas "field" version (fieldReplay). */
function mapReplay(container, rec, friend, {duration=6200, interactive=false, framePad}={}){
  if(!replayRenderable(rec)) return staticReplay(container, rec, friend);
  container.innerHTML='';
  const mapEl=document.createElement('div');mapEl.className='map';
  const cv=document.createElement('canvas');cv.className='ov';
  container.appendChild(mapEl);container.appendChild(cv);
  const pts=rec.replay,ci=rec.closestIndexInReplay;
  const ms=rec.meStartIdx||0, ts=rec.themStartIdx||0;   // each person's last-1km start
  const all=[...pts.slice(ms,ci+1).map(p=>[p.me.lat,p.me.lng]),
             ...pts.slice(ts,ci+1).map(p=>[p.them.lat,p.them.lng])];
  const fp=framePad||{top:60,bottom:60,x:30};
  const map=L.map(mapEl,{zoomControl:false,attributionControl:true,dragging:interactive,
    scrollWheelZoom:interactive,doubleClickZoom:interactive,boxZoom:false,keyboard:false,
    tap:false,zoomSnap:0,minZoom:3,maxZoom:18,fadeAnimation:false,zoomAnimation:false,inertia:true});
  map.attributionControl.setPrefix('');
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd',maxZoom:20,keepBuffer:10,updateWhenZooming:false,updateWhenIdle:false,
     attribution:'\u00A9 OpenStreetMap \u00A9 CARTO'}).addTo(map);
  let wideCenter, wideZoom;
  const closeMid=L.latLng((pts[ci].me.lat+pts[ci].them.lat)/2,(pts[ci].me.lng+pts[ci].them.lng)/2);
  function applyFit(){
    let b=L.latLngBounds(all);const c=b.getCenter(),MIN_M=170;
    const dLat=MIN_M/111111,dLng=MIN_M/(111111*Math.cos(c.lat*Math.PI/180));
    b=L.latLngBounds([c.lat-dLat,c.lng-dLng],[c.lat+dLat,c.lng+dLng]).extend(b);
    map.fitBounds(b,{paddingTopLeft:[fp.x,fp.top],paddingBottomRight:[fp.x,fp.bottom],maxZoom:16.5,animate:false});
    wideCenter=map.getCenter();wideZoom=map.getZoom();
  }
  applyFit();
  // close target: frame EXACTLY the two closest dots — computed mathematically (no setView round-trips,
  // which would thrash tiles and flash blank). The map only ever sets the wide view during setup.
  let closeCenter=closeMid, closeZoom=wideZoom;
  (function(){
    const cb=L.latLngBounds([pts[ci].me.lat,pts[ci].me.lng],[pts[ci].them.lat,pts[ci].them.lng]);
    const cc=cb.getCenter(),MIN=55,dLat=MIN/111111,dLng=MIN/(111111*Math.cos(cc.lat*Math.PI/180));
    const padded=L.latLngBounds([cc.lat-dLat,cc.lng-dLng],[cc.lat+dLat,cc.lng+dLng]).extend(cb);
    try{
      let z=map.getBoundsZoom(padded,false,L.point(fp.x+26,fp.top+26));
      closeZoom=Math.min(z,17.6); closeCenter=padded.getCenter();
    }catch(e){}
    if(closeZoom<wideZoom){closeZoom=wideZoom;closeCenter=closeMid;}   // only ever zoom IN
  })();
  // Preload every tile the punch-in will cross (along the wide->close path) so zooming never blanks:
  // the browser caches them now, while the wide view is showing, and serves them instantly mid-zoom.
  (function preloadZoomTiles(){
    if(typeof Image==='undefined')return;
    const subs=['a','b','c','d']; let si=0; const seen=new Set();
    for(let s=0;s<=8;s++){ const f=s/8;
      const z=Math.round(wideZoom+(closeZoom-wideZoom)*f);
      const lat=wideCenter.lat+(closeCenter.lat-wideCenter.lat)*f, lng=wideCenter.lng+(closeCenter.lng-wideCenter.lng)*f;
      const n=Math.pow(2,z), latR=lat*Math.PI/180;
      const cx=Math.floor((lng+180)/360*n), cy=Math.floor((1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n);
      for(let dx=-2;dx<=2;dx++)for(let dy=-2;dy<=2;dy++){
        const x=cx+dx,y=cy+dy; if(x<0||y<0||x>=n||y>=n)continue;
        const key=z+'/'+x+'/'+y; if(seen.has(key))continue; seen.add(key);
        const img=new Image(); img.src=`https://${subs[si++%4]}.basemaps.cartocdn.com/dark_all/${z}/${x}/${y}.png`;
      }
    }
  })();
  const canZoom=closeZoom>wideZoom+0.05;
  const ctx=cv.getContext('2d'),DPR=Math.min(2,devicePixelRatio||1);
  function size(){const r=mapEl.getBoundingClientRect();cv.width=Math.max(2,r.width*DPR);cv.height=Math.max(2,r.height*DPR);cv.style.width=r.width+'px';cv.style.height=r.height+'px';}
  size();
  const project=ll=>{const p=map.latLngToContainerPoint(L.latLng(ll.lat,ll.lng));return{x:p.x*DPR,y:p.y*DPR};};
  const paint=makePaint(ctx,project,pts,ci,friend.color,DPR,fmtDistPlain(rec.closest),{me:rec.meStartIdx||0,them:rec.themStartIdx||0});
  const t0=pts[0].t,tC=pts[ci].t;
  let last={headT:t0,env:0,focus:0,rawP:0}, curZ=wideZoom;
  function frame(rawP){const tl=replayTimeline(rawP,t0,tC);last={headT:tl.headT,env:tl.env,focus:tl.focus,rawP};
    if(canZoom){                                           // drive the zoom ourselves, in sync with the overlay
      const z=wideZoom+(closeZoom-wideZoom)*tl.focus;
      if(Math.abs(z-curZ)>0.0015){curZ=z;
        const c=L.latLng(wideCenter.lat+(closeCenter.lat-wideCenter.lat)*tl.focus, wideCenter.lng+(closeCenter.lng-wideCenter.lng)*tl.focus);
        try{map.setView(c,z,{animate:false})}catch(e){}}    // fires 'move' -> repaint, dots stay locked to the map
    }
    ctx.clearRect(0,0,cv.width,cv.height);paint(tl.headT,tl.env,tl.focus,rawP,cv.width,cv.height);}
  map.on('move zoom resize',()=>{ctx.clearRect(0,0,cv.width,cv.height);paint(last.headT,last.env,last.focus,last.rawP,cv.width,cv.height);});
  let cancelAnim=animate(duration,frame,{loop:false});
  setTimeout(()=>{map.invalidateSize();size();if(curZ===wideZoom)applyFit();frame(last.rawP);},80);
  const cleanup=()=>{try{cancelAnim&&cancelAnim()}catch(e){}try{map.remove()}catch(e){}};
  anims.push(cleanup);
  return {cancel:cleanup, restart:()=>{try{cancelAnim&&cancelAnim()}catch(e){}curZ=wideZoom;try{map.setView(wideCenter,wideZoom,{animate:false})}catch(e){}cancelAnim=animate(duration,frame,{loop:false});}};
}

/* ---- static fallback when a replay is too thin/degenerate to animate ---- */
function staticReplay(container, rec, friend){
  container.innerHTML='';
  const d=document.createElement('div');
  d.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;color:#9aa3ad;font:500 13px Inter,system-ui,sans-serif;line-height:1.55';
  const dist=(typeof rec.closest==='number')?fmtDistPlain(rec.closest):'';
  d.innerHTML=(dist?('Closest point \u2014 <span style="color:#D8B06A">'+dist+'</span><br>'):'')
    +'<span style="opacity:.7">not enough movement to replay the path</span>';
  container.appendChild(d);
  return {cancel(){}, restart(){}};
}

/* ---- chooser: map when Leaflet is available, field otherwise ---- */
function startReplay(container, rec, friend, opts={}){
  if(!replayRenderable(rec)) return staticReplay(container, rec, friend);
  if(typeof L!=='undefined' && opts.map!==false) return mapReplay(container, rec, friend, opts);
  let cv=container.querySelector('canvas.fb');
  if(!cv){container.innerHTML='';cv=document.createElement('canvas');cv.className='fb';cv.style.cssText='position:absolute;inset:0';container.appendChild(cv);}
  let cancel=fieldReplay(cv,rec,friend,opts);
  return {cancel, restart:()=>{cancel&&cancel();cancel=fieldReplay(cv,rec,friend,opts);}};
}

/* ---- line graph (log scale, animated) ---- */
function lineGraph(series, days, {h=150, guides=true}={}){
  const W=380, P=14, top=14, bot=h-22;
  const dMin=Math.log10(5), dMax=Math.log10(200000);
  const yOf=d=>{const v=(Math.log10(Math.max(5,Math.min(200000,d)))-dMin)/(dMax-dMin); return top+(1-v)*(bot-top);};
  const xOf=i=>P+(i/(days-1))*(W-2*P);
  let g='';
  if(guides){ [[100,'100 m'],[1000,'1 km'],[10000,'10 km']].forEach(([d,l])=>{
    const y=yOf(d); g+=`<line class="gguide" x1="${P}" y1="${y.toFixed(1)}" x2="${W-P}" y2="${y.toFixed(1)}"/>`+
      `<text class="glabel" x="${W-P}" y="${(y-3).toFixed(1)}" text-anchor="end">${l}</text>`; }); }
  let paths='';
  series.forEach((s,idx)=>{
    let d='';
    s.vals.forEach((v,i)=>{ d+=(i===0?'M':'L')+xOf(i).toFixed(1)+' '+yOf(v).toFixed(1)+' '; });
    const len=2200;
    paths+=`<path class="gpath" d="${d}" stroke="${s.color}" style="stroke-dasharray:${len};stroke-dashoffset:${len};animation:draw 1.2s ${idx*0.12}s cubic-bezier(.3,.7,.2,1) forwards"/>`;
  });
  return `<svg class="graph" viewBox="0 0 ${W} ${h}" preserveAspectRatio="none">
    <style>@keyframes draw{to{stroke-dashoffset:0}}</style>${g}${paths}</svg>`;
}

/* ---- rank chart: who was closest, day by day (y = rank 1..N, not distance) ---- */
function rankChart(friends, dates, {h=158}={}){
  const N=friends.length, days=dates.length, W=380, PL=30, PR=14, top=16, bot=h-26;
  const yOf=r=>top+(N===1?0:((r-1)/(N-1))*(bot-top));      // rank 1 at the top
  const xOf=i=>PL+(days<=1?0:(i/(days-1))*(W-PL-PR));
  let guides='';
  for(let r=1;r<=N;r++){const y=yOf(r);
    guides+=`<line class="gguide" x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}"/>`+
      `<text class="glabel" x="${PL-7}" y="${(y+3.5).toFixed(1)}" text-anchor="end">${ordinal(r)}</text>`;}
  let paths='';
  friends.forEach((f,idx)=>{ let d='';
    f.records.forEach((r,i)=>{ d+=(i===0?'M':'L')+xOf(i).toFixed(1)+' '+yOf(r.rank).toFixed(1)+' '; });
    const dots=f.records.map((r,i)=>`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(r.rank).toFixed(1)}" r="3.6" fill="${f.color}"/>`).join('');
    const len=1600;
    paths+=`<path d="${d}" fill="none" stroke="${f.color}" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round" opacity="0.92" style="stroke-dasharray:${len};stroke-dashoffset:${len};animation:draw 1.1s ${idx*0.1}s cubic-bezier(.3,.7,.2,1) forwards"/>${dots}`;
  });
  return `<svg class="graph rankchart" viewBox="0 0 ${W} ${h}" preserveAspectRatio="none">
    <style>@keyframes draw{to{stroke-dashoffset:0}}</style>${guides}${paths}</svg>`;
}

/* ======================= SCREENS ======================= */
const sorted = dir => world.friends.slice().sort((a,b)=> dir==='close'? a.yesterday.closest-b.yesterday.closest : b.yesterday.closest-a.yesterday.closest);
let yDate;

/* ---- reveal intro ---- */
function renderIntro(){
  phone.dataset.full='1';

    <canvas id="introCv"></canvas>
    <div class="inner">
      <div class="eyebrow">${fDate(yDate,{weekday:'long'})} · ${fDate(yDate,{day:'numeric',month:'long'})}</div>
      <h1>Yesterday</h1>
      <div class="sub">Here's how close your life came to <b>${world.friends.length} friends</b> — quietly, while you lived it.</div>
    </div>
    <div class="tapcue"><span>Tap to begin</span></div>
  </div>`;
  ambientDots(document.getElementById('introCv'));
  document.getElementById('introScreen').onclick=()=>{ S.order='far'; S.idx=0; go('reveal'); };
}
function ambientDots(cv){
  const ctx=cv.getContext('2d'),DPR=Math.min(2,devicePixelRatio||1);
  const r=cv.getBoundingClientRect(); cv.width=r.width*DPR; cv.height=r.height*DPR;
  const W=cv.width,H=cv.height;
  const dots=[{x:.36,y:.42,c:'#D8B06A',r:7},{x:.62,y:.5,c:'#7C9CB5',r:6},{x:.5,y:.66,c:'#C39B86',r:5}];
  animate(16000, (t)=>{ ctx.clearRect(0,0,W,H);
    dots.forEach((d,i)=>{ const a=t*6.28+i*2; const x=(d.x+Math.cos(a)*.06)*W, y=(d.y+Math.sin(a*.8)*.05)*H;
      ctx.save(); ctx.shadowColor=d.c; ctx.shadowBlur=40*DPR; ctx.globalAlpha=.5; ctx.fillStyle=d.c;
      ctx.beginPath(); ctx.arc(x,y,d.r*DPR,0,7); ctx.fill(); ctx.restore(); }); }, {loop:true});
}

/* ---- reveal stories ---- */
function renderReveal(){
  phone.dataset.full='1';
  const list=sorted(S.order);
  const f=list[S.idx];
  const y=f.yesterday;
  const [num,unit]=distParts(y.closest);
  const segs=list.map((_,i)=>`<div class="seg ${i<S.idx?'done':''} ${i===S.idx?'active':''}"><b></b></div>`).join('');
  const badges=y.badges.map(b=>`<span class="badge"><i>${b.icon}</i>${b.label}</span>`).join('');

    <div class="map" id="storyMap"></div><div class="scrim"></div>
    <div class="segments">${segs}</div>
    <div class="swipe-cue"><div class="bar"></div><div class="txt">Swipe down to close</div></div>
    <button class="orderbtn" id="orderBtn">${S.order==='close'?'Furthest first':'Closest first'}</button>
    <div class="story-content">
      <div class="meta">yesterday · closest at ${fmtClockSec(y.closestT)}</div>
      <div class="story-name">${f.name}</div>
      <div class="hero-distance">${num}<small>${unit}</small></div>
      <div class="story-rank"><span class="pip" style="background:${f.color}"></span>${ordinal(y.rank)} closest of your ${world.friends.length} friends</div>
      ${badges?`<div class="badges">${badges}</div>`:''}
    </div>
    <div class="tapzone left" id="prevZone"></div>
    <div class="tapzone right" id="nextZone"></div>
  </div>`;
  startReplay(document.getElementById('storyMap'), y, f, {duration:9000, interactive:false, framePad:{top:104,bottom:268,x:34}});
  let swiping=false;
  document.getElementById('nextZone').onclick=()=>{ if(swiping)return; S.idx<list.length-1 ? go('reveal',{idx:S.idx+1}) : go('home'); };
  document.getElementById('prevZone').onclick=()=>{ if(swiping)return; S.idx>0 && go('reveal',{idx:S.idx-1}); };
  document.getElementById('orderBtn').onclick=e=>{ e.stopPropagation(); go('reveal',{order:S.order==='close'?'far':'close',idx:0}); };
  // swipe DOWN to leave the stories
  (function(){
    const story=document.getElementById('story'); let sy=null,sx=null,active=false;
    const reset=()=>{story.style.transition='transform .22s ease, opacity .22s ease';story.style.transform='';story.style.opacity='';};
    story.addEventListener('touchstart',e=>{const t=e.touches[0];sy=t.clientY;sx=t.clientX;active=false;story.style.transition='none';},{passive:true});
    story.addEventListener('touchmove',e=>{ if(sy==null)return; const t=e.touches[0],dy=t.clientY-sy,dx=t.clientX-sx;
      if(dy>14 && dy>Math.abs(dx)){active=true;swiping=true;story.style.transform='translateY('+Math.min(dy,260)+'px)';story.style.opacity=String(Math.max(.35,1-dy/520));} },{passive:true});
    story.addEventListener('touchend',e=>{ if(sy==null)return; const dy=(e.changedTouches[0]?e.changedTouches[0].clientY:sy)-sy;
      if(active && dy>95){story.style.transition='transform .2s ease, opacity .2s ease';story.style.transform='translateY(110%)';story.style.opacity='0';setTimeout(()=>go('home'),170);}
      else {reset();setTimeout(()=>{swiping=false;},60);} sy=null; },{passive:true});
  })();
}
function ordinal(n){return n+(['th','st','nd','rd'][(n%100>>3^1&&n%10)||0]||'th');}

      <div class="chev">${ICON.fwd}</div>
    </div>`;}).join('');
  const N=world.friends.length, yIdx=world.DAYS-1;
  const medal=k=>['🥇','🥈','🥉'][k-1]||'';
  const furthestRankOf=(f,idx)=>f.records.filter(r=>r.closest>f.records[idx].closest).length+1;   // 1 = largest ever
  const within100Count=(f,idx)=>f.records.slice(0,idx+1).filter(r=>r.closest<100).length;
  const furthestStreak=f=>{let s=0;for(let i=f.records.length-1;i>=0;i--){if(f.records[i].rank===N)s++;else break;}return s;};
  // celebratory line for each friend's yesterday: a medal for a new top-3 furthest, else a clean "Nth day together"
  function achievement(f){ const r=f.yesterday, fr=furthestRankOf(f,yIdx);
    if(r.closest>=100 && fr<=3) return {cls:'far', txt:`${medal(fr)} ${fr===1?'Furthest':ordinal(fr)+' furthest'} you've ever been apart`};
    if(r.closest<100) return {cls:'near', txt:`💛 ${ordinal(within100Count(f,yIdx))} day you've been together`};
    return null; }

  // ---- Highlights: Instagram-style circular bubbles, one per day (most recent first) ----
  const hlBubbles = world.dates.map((d,i)=>{
    const recs=world.friends.map(f=>f.records[i]);
    let closest=recs[0]; recs.forEach(r=>{if(r.closest<closest.closest)closest=r;});
    return {i, date:d, fr:byId(closest.friend)};
  }).reverse().map(b=>`
    <button class="hl-bubble" data-replay="${b.fr.id}" data-day="${b.i}">
      <span class="hl-ring"><span class="hl-cover" style="--c:${b.fr.color}">${b.fr.name[0]}</span></span>
      <span class="hl-lab">${fDate(b.date,{weekday:'short'})}<small>${fDate(b.date,{day:'numeric',month:'short'})}</small></span>
    </button>`).join('');

  const legend=world.friends.map(f=>`<span><i style="background:${f.color}"></i>${f.name}</span>`).join('');
  const flist=world.friends.map(f=>{const a=achievement(f);
    return `<div class="lb-row" data-friend="${f.id}">
      <div class="lb-dot" style="background:${f.color}">${f.name[0]}</div>
      <div class="lb-main"><div class="lb-name">${f.name}</div>
        <div class="lb-sub">${distParts(f.yesterday.closest).join(' ')} yesterday · ${f.daysNo1} days ranked #1</div>
        ${a?`<div class="ach ${a.cls}">${a.txt}</div>`:''}</div>
      <div class="chev">${ICON.fwd}</div></div>`;}).join('');

  // ---- Records ----
  let furthestEver=null; world.friends.forEach(f=>f.records.forEach((r,i)=>{if(!furthestEver||r.closest>furthestEver.r.closest)furthestEver={f,r,i};}));
  const w100Lead=world.friends.map(f=>({f,n:f.streak100.current})).sort((a,b)=>b.n-a.n);
  const farLead =world.friends.map(f=>({f,n:furthestStreak(f)})).sort((a,b)=>b.n-a.n);
  const streakCard=(title,icon,lead,subFn)=>{
    const rows=lead.filter(x=>x.n>0).slice(0,3).map((x,i)=>
      `<div class="rec-row" data-friend="${x.f.id}"><span class="rec-medal">${medal(i+1)}</span>
        <span class="rec-dot" style="background:${x.f.color}"></span><span class="rec-name">${x.f.name}</span>
        <span class="rec-val">${x.n} day${x.n===1?'':'s'}</span></div>`).join('');
    return `<div class="rec-card"><div class="rec-head">${icon} ${title}</div>
      ${rows||'<div class="rec-empty">No streak running</div>'}
      ${lead[0].n>0&&subFn?`<div class="rec-sub">${subFn(lead[0])}</div>`:''}</div>`;
  };
  const furthestCard = furthestEver ? `<div class="rec-card" data-replay="${furthestEver.f.id}" data-day="${furthestEver.i}">
    <div class="rec-head">🥇 Furthest you've ever been apart</div>
    <div class="rec-row"><span class="rec-dot" style="background:${furthestEver.f.color}"></span>
      <span class="rec-name">${furthestEver.f.name}</span>
      <span class="rec-val gold">${distParts(furthestEver.r.closest).join(' ')}</span></div>
    <div class="rec-sub">${fDate(furthestEver.r.date,{weekday:'long',day:'numeric',month:'short'})}</div></div>` : '';
  const recordsHtml = `${furthestCard}
    ${streakCard('Within 100 m, in a row','🔥', w100Lead, x=>`${x.f.name}: ${ordinal(within100Count(x.f,yIdx))} day you've been together`)}
    ${streakCard('Your furthest, days running','↔️', farLead)}`;
  app.innerHTML=`<div class="screen">
    <div class="topbar"><div class="wordmark">Or<b>bit</b></div>
      <div style="display:flex;align-items:center">
        <button class="iconbtn" data-go="archive">${ICON.cal}</button>
        ${sb&&MYPROFILE?`<button class="acctbtn" data-go="account">${(MYPROFILE.name||'@')[0].toUpperCase()}</button>`:''}

        <div class="dist">${tn}<small> ${tu}</small></div></div>
      <div class="replay-tag">${ICON.replay} Replay the moment</div>
    </div>

    <div class="sec-h"><h3>Highlights</h3></div>

    <div class="card">${lb}</div>

    <div class="sec-h"><h3>Who was closest, day by day</h3><span>daily rank</span></div>
    <div class="card"><div class="legend">${legend}</div>${rankChart(world.friends, world.dates)}</div>

    <div class="sec-h"><h3>Records</h3></div>
    <div class="rec-grid">${recordsHtml}</div>

    <div class="sec-h"><h3>Friends</h3></div>

    <div class="sec-h"><h3>Archive</h3><span>${world.DAYS} days</span></div>
    <div class="card" data-go="archive">${miniArchive()}</div>
  </div>`;
  fieldReplay(document.getElementById('heroCv'), top.yesterday, top, {duration:8500, loop:true, ambient:true});
  wire();
}
function miniArchive(){
  const recs=world.friends[0].records;
  const overall=world.dates.map((d,i)=>Math.min(...world.friends.map(f=>f.records[i].closest)));
  const weeks=[]; let wk=[];
  overall.forEach((v,i)=>{ wk.push(v); if(wk.length===7){weeks.push(wk);wk=[];} });
  if(wk.length)weeks.push(wk);
  const cellsHtml=weeks.slice(-9).map(w=>`<div class="wkrow">${
    w.map(v=>{const a=Math.max(.08,Math.min(.95,1-(Math.log10(Math.max(5,v))-Math.log10(5))/(Math.log10(50000)-Math.log10(5))));
      return `<div class="cell" style="background:rgba(216,176,106,${a.toFixed(2)})"></div>`;}).join('')}</div>`).join('');
  return `<div class="archive-mini">${cellsHtml}</div>`;
}

async function friendRows(){
  const {data:f}=await sb.from('friendships').select('user_a,user_b,since');
  const others=(f||[]).map(r=>({id:r.user_a===ME?r.user_b:r.user_a, since:r.since}));
  if(!others.length) return [];
  const {data:profs}=await sb.from('profiles').select('id,name,color,home_lat,home_lng').in('id',others.map(o=>o.id));
  const by=Object.fromEntries((profs||[]).map(p=>[p.id,p]));
  return others.map(o=>({...(by[o.id]||{}), id:o.id, since:o.since}));
}

function startLogging(){
  if(!navigator.geolocation) return;
  let last=null;
  navigator.geolocation.watchPosition(async pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude, accuracy=pos.coords.accuracy, now=Date.now();
    if(last && now-last.t<25000 && haversine({lat,lng},last)<25) return;
    last={lat,lng,t:now};
    try{ await sb.from('locations').insert({user_id:ME, recorded_at:new Date(now).toISOString(), lat, lng, accuracy}); }catch(e){}
    if(MYPROFILE && MYPROFILE.home_lat==null){ MYPROFILE.home_lat=lat; MYPROFILE.home_lng=lng;
      try{ await sb.from('profiles').update({home_lat:lat,home_lng:lng}).eq('id',ME); }catch(e){} }
  }, ()=>{}, {enableHighAccuracy:true, maximumAge:15000, timeout:20000});
}

/* ---------- replay hardening ----------
   Real GPS is sparse and often stationary: two phones sitting on a table log a
   handful of near-identical fixes, and a frame can come back missing a side
   (JSON drops an undefined coord, NaN serialises to null). A thin or malformed
   replay must never crash the morning reveal. Drop any frame whose me/them
   isn't a real coordinate, renumber, clamp the indices, and guarantee >=2 good
   frames so the renderers always have something safe to draw. */
function finiteNum(n){ return typeof n==='number' && isFinite(n); }
function validPt(p){ return !!p && finiteNum(p.lat) && finiteNum(p.lng); }
function cleanReplay(raw, iAmA, ci, ms, ts){
  const mapped=(raw||[]).map(p=>({ t:p.t, me:iAmA?p.a:p.b, them:iAmA?p.b:p.a }));
  let pts=mapped.filter(f=>validPt(f.me)&&validPt(f.them))
                .map((f,i)=>({ t:i, me:{lat:f.me.lat,lng:f.me.lng}, them:{lat:f.them.lat,lng:f.them.lng} }));
  if(!pts.length) return { replay:[], ci:0, ms:0, ts:0 };
  if(pts.length===1) pts.push({ t:1, me:{...pts[0].me}, them:{...pts[0].them} });
  const n=pts.length;
  let CI=(finiteNum(ci)&&ci>=0&&ci<n)?Math.floor(ci):n-1;   // convergence engine puts the closest frame last
  CI=Math.max(0,Math.min(CI,n-1));
  const clamp=v=>Math.max(0,Math.min(finiteNum(v)&&v>=0?Math.floor(v):0, CI));
  return { replay:pts, ci:CI, ms:clamp(ms), ts:clamp(ts) };
}
function replayRenderable(rec){
  const p=rec&&rec.replay, ci=rec&&rec.closestIndexInReplay;
  return !!(p && p.length>=2 && p[ci] && validPt(p[ci].me) && validPt(p[ci].them));
}
function lastThem(r){ const a=r&&r.replay; if(!a||!a.length) return null;
  const p=a[r.closestIndexInReplay]||a[a.length-1]; return validPt(p&&p.them)?p.them:((a.find(x=>validPt(x.them))||{}).them||null); }
function firstMe(r){ const a=r&&r.replay; if(!a||!a.length) return null;
  const p=a[0]; return validPt(p&&p.me)?p.me:((a.find(x=>validPt(x.me))||{}).me||null); }

async function loadWorld(){
  const fr=await friendRows();
  if(!fr.length) return {empty:'no-friends'};
  const {data:recs}=await sb.from('daily_records').select('*').order('day',{ascending:true});
  const keys=[...new Set((recs||[]).map(r=>r.day))].sort();
  if(!keys.length) return {empty:'no-records'};
  const dates=keys.map(dayStartEpoch), idxOf=Object.fromEntries(keys.map((k,i)=>[k,i]));
  const groups={}; fr.forEach(f=>groups[f.id]=[]);
  (recs||[]).forEach(r=>{ const other=r.user_a===ME?r.user_b:r.user_a; if(other in groups)groups[other].push(r); });

  const friends=[];
  fr.forEach(f=>{ const rs=groups[f.id]; if(!rs||!rs.length) return;
    const recList=rs.map(r=>{ const iAmA=r.user_a===ME, t=Date.parse(r.closest_t);
      const rawMs=iAmA?r.a_start_idx:r.b_start_idx, rawTs=iAmA?r.b_start_idx:r.a_start_idx;
      const cr=cleanReplay(r.replay, iAmA, r.closest_index, rawMs, rawTs);
      return { friend:f.id, date:dayStartEpoch(r.day), dayIndex:idxOf[r.day],
        closest:r.closest_m, closestT:t, closestMin:(r.closest_min!=null?r.closest_min:briMin(t)),
        replay:cr.replay, closestIndexInReplay:cr.ci, meStartIdx:cr.ms,
        themStartIdx:cr.ts, rank:0, badges:[] };
    }).sort((a,b)=>a.dayIndex-b.dayIndex);
    const last=recList[recList.length-1];
    const since=f.since?Math.max(0,Math.round((Date.now()-Date.parse(f.since))/86400000)):0;
    const lt=lastThem(last)||{lat:-26.65,lng:153.09};
    friends.push({ id:f.id, name:f.name||'Friend', color:f.color||'#9aa3ad', sinceDays:since,
      home:{lat:f.home_lat!=null?f.home_lat:lt.lat, lng:f.home_lng!=null?f.home_lng:lt.lng},
      records:recList });
  });
  if(!friends.length) return {empty:'no-records'};

  keys.forEach((k,di)=>{ const today=friends.map(f=>f.records.find(r=>r.dayIndex===di)).filter(Boolean);
    today.sort((a,b)=>a.closest-b.closest).forEach((r,i)=>r.rank=i+1); });

  friends.forEach(f=>{ const recs=f.records, closest=recs.map(r=>r.closest);
    const srt=closest.slice().sort((a,b)=>a-b); f.median=srt[Math.floor(srt.length/2)];
    f.avg=closest.reduce((s,v)=>s+v,0)/closest.length; const within=m=>recs.filter(r=>r.closest<=m).length;
    const furthest=Math.max(...closest); f.furthest=furthest; const fd=recs.find(r=>r.closest===furthest); f.furthestDay=fd.date;
    f.avgRank=recs.reduce((s,r)=>s+r.rank,0)/recs.length; f.daysNo1=recs.filter(r=>r.rank===1).length;
    const run=test=>{let cur=0,rec=0;for(const r of recs){if(test(r)){cur++;rec=Math.max(rec,cur);}else cur=0;}
      let trail=0;for(let i=recs.length-1;i>=0;i--){if(test(recs[i]))trail++;else break;}return{current:trail,record:rec};};
    f.streak1km=run(r=>r.closest<=1000); f.streak100=run(r=>r.closest<=100); f.streakNo1=run(r=>r.rank===1);
    f.within100=within(100); f.within1k=within(1000); f.within5k=within(5000);
    if(furthest>25000)fd.badges.push({icon:'🌍',label:'Furthest ever'});
    if(f.sinceDays>365)recs[0].badges.push({icon:'🏠',label:'First year together'});
    else if(f.sinceDays>100)recs[0].badges.push({icon:'🤝',label:'100 days together'}); });

  const leaderboard=friends.slice().sort((a,b)=>a.median-b.median).map(f=>({id:f.id}));
  const fm=firstMe(friends[0].records[0])||{lat:-26.65,lng:153.09};
  const meHome={lat:(MYPROFILE.home_lat!=null?MYPROFILE.home_lat:fm.lat),
                lng:(MYPROFILE.home_lng!=null?MYPROFILE.home_lng:fm.lng)};
  return { me:{id:ME,name:MYPROFILE.name||'You'}, friends, leaderboard, dates, DAYS:dates.length, home:meHome };
}

async function bootReal(){
  app.innerHTML=`<div class="intro"><div class="inner"><div class="eyebrow">Orbit</div>
    <div class="sub" style="margin-top:20px;opacity:.8">connecting…</div></div></div>`;
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ renderAuth(); return; }
  ME=session.user.id;
  let {data:prof}=await sb.from('profiles').select('*').eq('id',ME).maybeSingle();
  if(!prof){ await sb.from('profiles').insert({id:ME}); const r=await sb.from('profiles').select('*').eq('id',ME).maybeSingle(); prof=r.data; }
  MYPROFILE=prof||{id:ME};
  if(!MYPROFILE.name){ renderOnboard(); return; }
  startLogging();
  const w=await loadWorld();
  if(w.empty==='no-friends'){ renderAddFriend(true); return; }
  if(w.empty==='no-records'){ renderFirstReveal(); return; }
  world=reviveWorld(w); yDate=world.dates[world.dates.length-1]; render();
}
function qs(id){return document.getElementById(id);}

// build the world behind a splash (keeps the open instant)
function boot(){
  if(sb){ bootReal(); return; }
  app.innerHTML=`<div class="intro"><div class="inner"><div class="eyebrow">Orbit</div>
    <div class="sub" style="margin-top:20px;opacity:.8">gathering yesterday<span id="dotdot">…</span></div></div></div>`;
  setTimeout(()=>{ world=reviveWorld(REAL_WORLD); yDate=world.dates[world.dates.length-1]; render(); }, 50);
}
boot();
